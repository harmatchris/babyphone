<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Babyphone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#0d0d0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#f0f0f0;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:28px}
.logo{font-size:52px;line-height:1}
h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.sub{font-size:14px;color:#666;margin-top:-20px;text-align:center}
.cards{width:100%;display:flex;flex-direction:column;gap:12px}
a.card{display:flex;align-items:center;gap:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px 20px;text-decoration:none;color:#f0f0f0;transition:all .18s;cursor:pointer}
a.card:hover{background:#252527;border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
a.card:active{transform:scale(.98);background:#111}
.card-icon{font-size:32px;width:44px;text-align:center;flex-shrink:0}
.card-text{}
.card-title{font-size:17px;font-weight:600;margin-bottom:3px}
.card-sub{font-size:13px;color:#888}
.card.viewer{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(29,78,216,.12));border-color:rgba(59,130,246,.3)}
.card.viewer:hover{background:linear-gradient(135deg,rgba(59,130,246,.28),rgba(29,78,216,.2));border-color:rgba(59,130,246,.5)}
.card.viewer .card-title{color:#93c5fd}
.divider{width:100%;display:flex;align-items:center;gap:12px;color:#444;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#222}
.footer{font-size:12px;color:#444;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🍼</div>
  <h1>Babyphone</h1>
  <p class="sub">Wähle deinen Modus</p>

  <div class="cards">

    <div class="divider">Kameras</div>

    <a class="card" href="kamera.html?cam=1">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">Cam 1</div>
        <div class="card-sub">Erstes iPhone als Kamera</div>
      </div>
    </a>

    <a class="card" href="kamera.html?cam=2">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">Cam 2</div>
        <div class="card-sub">Zweites iPhone als Kamera</div>
      </div>
    </a>

    <a class="card" href="kamera.html?cam=3">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">Cam 3</div>
        <div class="card-sub">Drittes iPhone als Kamera</div>
      </div>
    </a>

    <div class="divider">Viewer</div>

    <a class="card viewer" href="viewer.html">
      <div class="card-icon">📺</div>
      <div class="card-text">
        <div class="card-title">Viewer</div>
        <div class="card-sub">Alle Kameras am PC anschauen</div>
      </div>
    </a>

  </div>

  <p class="footer">harmatchris.github.io/babyphone</p>
</div>
</body>
</html>
