<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Babyphone">
  <title>Babyphone</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #liveView { display: none; position: fixed; inset: 0; }
    #liveView.visible { display: block; }
    #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Status pill top */
    .pill {
      position: fixed; top: env(safe-area-inset-top, 16px); left: 50%; transform: translateX(-50%);
      margin-top: 12px; background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); border-radius: 100px; padding: 8px 18px;
      display: flex; align-items: center; gap: 8px;
      font-family: -apple-system, sans-serif; font-size: 14px; color: #fff; white-space: nowrap; z-index: 100;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #666; flex-shrink: 0; }
    .dot.green { background: #4ade80; animation: blink 2s infinite; }
    .dot.orange { background: #fb923c; }
    .dot.red { background: #f87171; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Bottom controls bar */
    #controls {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      z-index: 100;
    }

    /* Camera selector row */
    #camRow {
      display: flex; gap: 8px; align-items: center;
    }
    .cam-btn {
      background: rgba(0,0,0,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.25); border-radius: 100px;
      padding: 8px 16px; font-family: -apple-system, sans-serif;
      font-size: 14px; font-weight: 600; color: #fff; cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .cam-btn.active {
      background: rgba(255,255,255,.22); border-color: #fff;
    }

    /* Night mode button */
    #nightBtn {
      background: rgba(0,0,0,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.2); border-radius: 100px;
      padding: 11px 28px; font-family: -apple-system, sans-serif;
      font-size: 15px; font-weight: 600; color: #fff;
      cursor: pointer; white-space: nowrap;
    }

    /* Night overlay */
    #nightOverlay {
      display: none; position: fixed; inset: 0; background: #000; z-index: 200;
      align-items: center; justify-content: center;
    }
    #nightOverlay.active { display: flex; }
    #nightHint {
      color: rgba(255,255,255,.06); font-family: -apple-system, sans-serif;
      font-size: 13px; text-align: center; line-height: 1.8; user-select: none;
      pointer-events: none;
    }

    /* Connected banner */
    .connected-banner {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 120px);
      left: 50%; transform: translateX(-50%);
      background: rgba(74,222,128,.2); border: 1px solid rgba(74,222,128,.5);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 100px;
      padding: 10px 24px; font-family: -apple-system, sans-serif; font-size: 14px; color: #4ade80;
      z-index: 100; opacity: 0; transition: opacity .4s;
    }
    .connected-banner.show { opacity: 1; }

    /* Tap / load screens */
    #tapScreen {
      display: none; position: fixed; inset: 0; background: #0d0d0f;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; font-family: -apple-system, sans-serif; color: #fff;
      text-align: center; padding: 32px; cursor: pointer;
    }
    #tapScreen.visible { display: flex; }
    #tapScreen h1 { font-size: 26px; font-weight: 700; }
    #tapScreen p { font-size: 16px; color: #888; line-height: 1.5; max-width: 280px; }
    .tap-ring {
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(74,222,128,.15); border: 2px solid rgba(74,222,128,.4);
      display: flex; align-items: center; justify-content: center; font-size: 40px;
      animation: ring 2s infinite;
    }
    @keyframes ring {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74,222,128,.4); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(74,222,128,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }
    #loadScreen { position: fixed; inset: 0; background: #0d0d0f; display: flex; align-items: center; justify-content: center; }
    #loadScreen.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #4ade80; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loadScreen"><div class="spinner"></div></div>

  <div id="tapScreen" onclick="onTap()">
    <div class="tap-ring">&#x1F4F7;</div>
    <h1>Babyphone starten</h1>
    <p>Einmalig tippen um die Kamera zu erlauben. Danach startet die App immer automatisch.</p>
  </div>

  <div id="liveView">
    <video id="cameraFeed" autoplay playsinline muted></video>
    <div class="pill"><div class="dot" id="dot"></div><span id="statusText">Verbinde...</span></div>
    <div class="connected-banner" id="connBanner">&#x1F7E2; Verbunden mit Computer</div>

    <div id="controls">
      <div id="camRow"><!-- camera buttons injected here --></div>
      <button id="nightBtn" onclick="enterNightMode()">&#x1F319; Bildschirm abdunkeln</button>
    </div>
  </div>

  <!-- Pure black overlay. Exit: triple-tap with 2 fingers -->
  <div id="nightOverlay">
    <div id="nightHint">3x mit 2 Fingern tippen zum Einschalten</div>
  </div>

  <script>
    const ROOM_CODE = 'rwe4v2x0';
    const PEER_ID   = 'babyphone-cam--' + ROOM_CODE;
    let stream = null, peer = null, currentCall = null, wakeLock = null;
    let cameras = [];   // [{deviceId, label, display}]
    let activeCamId = null;

    // ── Startup ────────────────────────────────────────────────
    window.addEventListener('load', () => { tryStart(false); });

    async function tryStart(fromTap) {
      let timedOut = false, hangTimer = null;
      if (!fromTap) {
        hangTimer = setTimeout(() => { timedOut = true; hide('loadScreen'); show('tapScreen'); }, 3000);
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        if (hangTimer) clearTimeout(hangTimer);
        if (!timedOut) onCameraReady();
      } catch(e) {
        if (hangTimer) clearTimeout(hangTimer);
        hide('loadScreen');
        if (!fromTap) show('tapScreen');
        else alert('Kamera-Zugriff verweigert: ' + e.message);
      }
    }

    function onTap() { hide('tapScreen'); show('loadScreen'); tryStart(true); }

    async function onCameraReady() {
      hide('loadScreen'); hide('tapScreen');
      document.getElementById('liveView').classList.add('visible');
      document.getElementById('cameraFeed').srcObject = stream;
      // record which camera is active
      const track = stream.getVideoTracks()[0];
      activeCamId = track?.getSettings()?.deviceId || null;
      keepScreenOn();
      keepAliveAudio();
      connectPeer();
      await loadCameraList();
      setupNightModeExit();
    }

    // ── Camera listing & switching ─────────────────────────────
    async function loadCameraList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const vids = devices.filter(d => d.kind === 'videoinput');
        cameras = vids.map(d => ({ deviceId: d.deviceId, label: d.label, display: labelToDisplay(d.label) }));
        renderCamButtons();
      } catch(e) {}
    }

    function labelToDisplay(label) {
      const l = label.toLowerCase();
      if (l.includes('ultra wide') || l.includes('ultrawide')) return '0.5x';
      if (l.includes('telephoto') || l.includes('tele'))         return 'Tele';
      if (l.includes('front') || l.includes('vorder'))           return '&#x21BA; Vorne';
      if (l.includes('back') || l.includes('rear') || l.includes('hinten')) return '1x';
      // fallback: front vs back by position
      return label || '1x';
    }

    function renderCamButtons() {
      const row = document.getElementById('camRow');
      row.innerHTML = '';
      if (cameras.length <= 1) return; // only one camera — hide row
      cameras.forEach(cam => {
        const btn = document.createElement('button');
        btn.className = 'cam-btn' + (cam.deviceId === activeCamId ? ' active' : '');
        btn.innerHTML = cam.display;
        btn.onclick = () => switchCamera(cam.deviceId);
        row.appendChild(btn);
      });
    }

    async function switchCamera(deviceId) {
      if (deviceId === activeCamId) return;
      try {
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        // Stop old video tracks
        stream.getVideoTracks().forEach(t => t.stop());
        // Replace video track in existing stream for PeerJS
        const newVideo = newStream.getVideoTracks()[0];
        const newAudio = newStream.getAudioTracks()[0];
        // Replace in WebRTC sender if call is active
        if (currentCall && currentCall.peerConnection) {
          currentCall.peerConnection.getSenders().forEach(sender => {
            if (sender.track?.kind === 'video' && newVideo) sender.replaceTrack(newVideo);
            if (sender.track?.kind === 'audio' && newAudio) sender.replaceTrack(newAudio);
          });
        }
        // Swap out stream reference
        stream.getVideoTracks().forEach(t => stream.removeTrack(t));
        stream.addTrack(newVideo);
        if (newAudio) { stream.getAudioTracks().forEach(t => { stream.removeTrack(t); t.stop(); }); stream.addTrack(newAudio); }
        stream = newStream;
        document.getElementById('cameraFeed').srcObject = stream;
        activeCamId = deviceId;
        renderCamButtons();
      } catch(e) {
        alert('Kamera wechsel fehlgeschlagen: ' + e.message);
      }
    }

    // ── Night mode ─────────────────────────────────────────────
    function enterNightMode() {
      document.getElementById('nightOverlay').classList.add('active');
    }
    function exitNightMode() {
      document.getElementById('nightOverlay').classList.remove('active');
    }

    function setupNightModeExit() {
      const overlay = document.getElementById('nightOverlay');
      let tapCount = 0, tapTimer = null;
      overlay.addEventListener('touchend', e => {
        // Only count touches where exactly 2 fingers were just released
        if (e.changedTouches.length === 2 && e.touches.length === 0) {
          tapCount++;
          if (tapTimer) clearTimeout(tapTimer);
          if (tapCount >= 3) {
            tapCount = 0;
            exitNightMode();
          } else {
            tapTimer = setTimeout(() => { tapCount = 0; }, 800);
          }
        }
        e.preventDefault();
      }, { passive: false });
    }

    // ── PeerJS ─────────────────────────────────────────────────
    function connectPeer() {
      if (peer) { try { peer.destroy(); } catch(e){} }
      peer = new Peer(PEER_ID, {
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
      });
      peer.on('open', () => setStatus('green', 'Bereit - warte auf Viewer...'));
      peer.on('call', call => {
        if (currentCall) try { currentCall.close(); } catch(e){}
        currentCall = call;
        call.answer(stream);
        showBanner(true); setStatus('green', 'Wird uebertragen');
        call.on('close', () => { currentCall = null; showBanner(false); setStatus('orange', 'Bereit - warte auf Viewer...'); });
        call.on('error', () => { currentCall = null; showBanner(false); setStatus('orange', 'Verbindungsfehler'); });
      });
      peer.on('error', err => {
        if (err.type === 'unavailable-id') { setStatus('orange', 'ID belegt - warte...'); setTimeout(connectPeer, 6000); }
        else { setStatus('red', 'Fehler: ' + err.type); setTimeout(connectPeer, 6000); }
      });
      peer.on('disconnected', () => { setStatus('orange', 'Reconnect...'); try { peer.reconnect(); } catch(e) { setTimeout(connectPeer, 4000); } });
    }

    // ── Keep alive ─────────────────────────────────────────────
    async function keepScreenOn() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { if (document.visibilityState === 'visible') keepScreenOn(); });
        }
      } catch(e) {}
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && (!wakeLock || wakeLock.released)) keepScreenOn();
      });
    }

    function keepAliveAudio() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        gain.gain.value = 0.0001;
        osc.connect(gain); gain.connect(ctx.destination); osc.start();
      } catch(e) {}
    }

    // ── Helpers ────────────────────────────────────────────────
    function setStatus(c, t) { document.getElementById('dot').className = 'dot ' + c; document.getElementById('statusText').textContent = t; }
    function showBanner(on) { document.getElementById('connBanner').classList.toggle('show', on); }
    function show(id) { const el = document.getElementById(id); if(el) el.style.display = ''; }
    function hide(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; }
  </script>
</body>
</html>
