<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Babyphone">
  <title>Babyphone</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    #liveView{display:none;position:fixed;inset:0}
    #liveView.visible{display:block}
    #cameraFeed{width:100%;height:100%;object-fit:cover;display:block}
    .pill{position:fixed;top:calc(env(safe-area-inset-top,16px) + 12px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:100px;padding:8px 18px;display:flex;align-items:center;gap:8px;font-family:-apple-system,sans-serif;font-size:14px;color:#fff;white-space:nowrap;z-index:100}
    .dot{width:9px;height:9px;border-radius:50%;background:#666;flex-shrink:0}
    .dot.green{background:#4ade80;animation:blink 2s infinite}
    .dot.orange{background:#fb923c}
    .dot.red{background:#f87171}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    #controls{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:100}
    #camRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;padding:0 16px}
    .cam-btn{background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.25);border-radius:100px;padding:8px 18px;font-family:-apple-system,sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
    .cam-btn.active{background:rgba(255,255,255,.22);border-color:#fff}
    #nightBtn{background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:12px 28px;font-family:-apple-system,sans-serif;font-size:15px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap}
    #nightOverlay{display:none;position:fixed;inset:0;background:#000;z-index:200;align-items:center;justify-content:center}
    #nightOverlay.active{display:flex}
    #nightHint{color:rgba(255,255,255,.07);font-family:-apple-system,sans-serif;font-size:13px;text-align:center;line-height:1.8;user-select:none;pointer-events:none}
    .connected-banner{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 120px);left:50%;transform:translateX(-50%);background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:100px;padding:10px 24px;font-family:-apple-system,sans-serif;font-size:14px;color:#4ade80;z-index:100;opacity:0;transition:opacity .4s}
    .connected-banner.show{opacity:1}
    #tapScreen{display:none;position:fixed;inset:0;background:#0d0d0f;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:-apple-system,sans-serif;color:#fff;text-align:center;padding:32px;cursor:pointer}
    #tapScreen.visible{display:flex}
    #tapScreen h1{font-size:26px;font-weight:700}
    #tapScreen p{font-size:16px;color:#888;line-height:1.5;max-width:280px}
    .tap-ring{width:90px;height:90px;border-radius:50%;background:rgba(74,222,128,.15);border:2px solid rgba(74,222,128,.4);display:flex;align-items:center;justify-content:center;font-size:40px;animation:ring 2s infinite}
    @keyframes ring{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(74,222,128,.4)}70%{transform:scale(1.05);box-shadow:0 0 0 20px rgba(74,222,128,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(74,222,128,0)}}
    #loadScreen{position:fixed;inset:0;background:#0d0d0f;display:flex;align-items:center;justify-content:center}
    #loadScreen.hidden{display:none}
    .spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#4ade80;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loadScreen"><div class="spinner"></div></div>
  <div id="tapScreen" onclick="onTap()">
    <div class="tap-ring">&#x1F4F7;</div>
    <h1>Babyphone starten</h1>
    <p>Einmalig tippen um die Kamera zu erlauben. Danach startet die App immer automatisch.</p>
  </div>
  <div id="liveView">
    <video id="cameraFeed" autoplay playsinline muted></video>
    <div class="pill"><div class="dot" id="dot"></div><span id="statusText">Starte...</span></div>
    <div class="connected-banner" id="connBanner">&#x1F7E2; Verbunden mit Computer</div>
    <div id="controls">
      <div id="camRow"></div>
      <button id="nightBtn" onclick="enterNightMode()">&#x1F319; Bildschirm abdunkeln</button>
    </div>
  </div>
  <div id="nightOverlay">
    <div id="nightHint">3x mit 2 Fingern tippen zum Einschalten</div>
  </div>
  <script>
    const FB={apiKey:"AIzaSyBQPi4f2qWg3xA65hLL7IpxOiq3kzVk5ls",authDomain:"ninja-hq-chris.firebaseapp.com",databaseURL:"https://ninja-hq-chris-default-rtdb.firebaseio.com",projectId:"ninja-hq-chris",storageBucket:"ninja-hq-chris.firebasestorage.app",messagingSenderId:"811964168411",appId:"1:811964168411:web:f49a87b1bdcb6aaebf74fe"};
    firebase.initializeApp(FB);
    const db=firebase.database(), S=db.ref('babyphone/session');
    const ICE={iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
  ]};
    let stream=null,pc=null,cameras=[],activeCamId=null;
    window.addEventListener('load',()=>tryStart(false));
    async function tryStart(fromTap){
      let timedOut=false,timer=null;
      if(!fromTap) timer=setTimeout(()=>{timedOut=true;hide('loadScreen');show('tapScreen');},3000);
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        if(timer)clearTimeout(timer);
        if(!timedOut)onCameraReady();
      }catch(e){
        if(timer)clearTimeout(timer);
        hide('loadScreen');
        if(!fromTap)show('tapScreen');
        else alert('Kamera verweigert: '+e.message);
      }
    }
    function onTap(){hide('tapScreen');show('loadScreen');tryStart(true);}
    async function onCameraReady(){
      hide('loadScreen');hide('tapScreen');
      document.getElementById('liveView').classList.add('visible');
      document.getElementById('cameraFeed').srcObject=stream;
      activeCamId=stream.getVideoTracks()[0]?.getSettings()?.deviceId||null;
      keepScreenOn();keepAliveAudio();
      await loadCameras();
      setupNightExit();
      startRTC();
    }
    async function loadCameras(){
      try{
        const devs=await navigator.mediaDevices.enumerateDevices();
        cameras=devs.filter(d=>d.kind==='videoinput').map(d=>({deviceId:d.deviceId,label:d.label,display:camLabel(d.label)}));
        renderCamBtns();
      }catch(e){}
    }
    function camLabel(l){
      const s=l.toLowerCase();
      if(s.includes('ultra wide')||s.includes('ultrawide'))return '0.5x';
      if(s.includes('telephoto')||s.includes('tele'))return 'Tele';
      if(s.includes('front')||s.includes('vorder')||s.includes('facetime'))return '&#x21BA; Vorne';
      if(s.includes('back')||s.includes('rear')||s.includes('hinten'))return '1x';
      return l.replace(/[()]/g,'').trim().split(' ').slice(0,2).join(' ')||'Kamera';
    }
    function renderCamBtns(){
      const row=document.getElementById('camRow');row.innerHTML='';
      if(cameras.length<=1)return;
      cameras.forEach(cam=>{
        const b=document.createElement('button');
        b.className='cam-btn'+(cam.deviceId===activeCamId?' active':'');
        b.innerHTML=cam.display;b.onclick=()=>switchCam(cam.deviceId);
        row.appendChild(b);
      });
    }
    async function switchCam(deviceId){
      if(deviceId===activeCamId)return;
      try{
        const ns=await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:deviceId},width:{ideal:1920},height:{ideal:1080}},audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        const nv=ns.getVideoTracks()[0],na=ns.getAudioTracks()[0];
        if(pc)pc.getSenders().forEach(s=>{if(s.track?.kind==='video'&&nv)s.replaceTrack(nv);if(s.track?.kind==='audio'&&na)s.replaceTrack(na);});
        stream.getTracks().forEach(t=>t.stop());stream=ns;
        document.getElementById('cameraFeed').srcObject=stream;
        activeCamId=deviceId;renderCamBtns();
      }catch(e){alert('Kamerawechsel fehlgeschlagen: '+e.message);}
    }
    async function startRTC(){
      setStatus('orange','Verbinde...');
      await S.remove();
      pc=new RTCPeerConnection(ICE);
      stream.getTracks().forEach(t=>pc.addTrack(t,stream));
      let iceBuf=[];
      pc.onicecandidate=e=>{if(e.candidate)S.child('ci').push(e.candidate.toJSON());};
      pc.onconnectionstatechange=()=>{
        const st=pc.connectionState;
        if(st==='connected'){setStatus('green','Live');showBanner(true);}
        else if(st==='connecting')setStatus('orange','Verbindet...');
        else if(['failed','disconnected','closed'].includes(st)){
          showBanner(false);setStatus('orange','Neuverbindung...');
          pc.close();pc=null;setTimeout(startRTC,2000);
        }
      };
      const offer=await pc.createOffer();
      await pc.setLocalDescription(offer);
      await S.child('offer').set({sdp:offer.sdp,type:offer.type,ts:Date.now()});
      setStatus('green','Bereit - warte auf Viewer...');
      S.child('answer').on('value',async snap=>{
        if(!snap.val()||!pc||pc.remoteDescription)return;
        try{await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));setStatus('orange','Verbindet...');}catch(e){}
      });
      S.child('vi').on('child_added',snap=>{
        if(!pc)return;
        const c=snap.val();
        if(pc.remoteDescription)pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{});
        else iceBuf.push(c);
      });
      pc.addEventListener('signalingstatechange',()=>{
        if(pc&&pc.signalingState==='stable'){iceBuf.forEach(c=>pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}));iceBuf=[];}
      });
    }
    function enterNightMode(){document.getElementById('nightOverlay').classList.add('active');}
    function exitNightMode(){document.getElementById('nightOverlay').classList.remove('active');}
    function setupNightExit(){
      const o=document.getElementById('nightOverlay');let cnt=0,t=null;
      o.addEventListener('touchend',e=>{
        if(e.changedTouches.length===2&&e.touches.length===0){
          cnt++;if(t)clearTimeout(t);
          if(cnt>=3){cnt=0;exitNightMode();}
          else t=setTimeout(()=>{cnt=0;},800);
        }
        e.preventDefault();
      },{passive:false});
    }
    async function keepScreenOn(){
      try{if('wakeLock'in navigator){const wl=await navigator.wakeLock.request('screen');wl.addEventListener('release',()=>{if(document.visibilityState==='visible')keepScreenOn();});}}catch(e){}
      document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')keepScreenOn();});
    }
    function keepAliveAudio(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();g.gain.value=0.0001;o.connect(g);g.connect(ctx.destination);o.start();}catch(e){}}
    function setStatus(c,t){document.getElementById('dot').className='dot '+c;document.getElementById('statusText').textContent=t;}
    function showBanner(on){document.getElementById('connBanner').classList.toggle('show',on);}
    function show(id){const e=document.getElementById(id);if(e)e.style.display='';}
    function hide(id){const e=document.getElementById(id);if(e)e.style.display='none';}
  </script>
</body>
</html>
